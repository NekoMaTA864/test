<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBC Web3 合約互動 - Hello Raymond</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    
    <style>
        /* ==========================================
           GBC 專屬配色定義
           桃香: #85C9DC (外框、日誌區塊)
           仁菜: #D90E2C (主標題、連接按鈕)
           昂:   #76BD53 (發送按鈕)
           智:   #E34D8D (分隔線)
           RUPA: #EEDA01 (當前訊息背景)
        ========================================== */
        body {
            font-family: 'Avenir', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #fafcfd;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .container {
            background-color: white;
            border: 3px solid #85C9DC; /* 桃香藍 */
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 6px 15px rgba(133, 201, 220, 0.2); /* 桃香藍陰影 */
        }

        h1, h2 {
            text-align: center;
            margin-top: 0;
        }

        h1 {
            font-size: 26px;
            color: #D90E2C; /* 仁菜紅 */
            margin-bottom: 25px;
        }

        h2 {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        hr {
            border: 0;
            height: 2px;
            background: #E34D8D; /* 智粉紅 */
            margin: 25px 0;
            opacity: 0.6;
        }

        .message-display {
            background-color: rgba(238, 218, 1, 0.15); /* RUPA 黃 (微透明背景) */
            border: 2px solid #EEDA01; /* RUPA 黃外框 */
            color: #333; 
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }

        #connectBtn {
            background-color: #D90E2C; /* 仁菜紅 */
            border: none;
            color: white;
        }
        #connectBtn:hover:not(:disabled) {
            background-color: #a80a21;
        }

        #updateBtn {
            background-color: #76BD53; /* 昂綠 */
            border: none;
            color: white;
        }
        #updateBtn:hover:not(:disabled) {
            background-color: #5a913e;
        }

        button:disabled {
            background-color: #d1d9e0 !important;
            color: #fff !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 2px solid #85C9DC; /* 桃香藍 */
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        input[type="text"]:focus {
            outline: none;
            box-shadow: 0 0 5px rgba(133, 201, 220, 0.8);
        }

        .log-box {
            background-color: rgba(133, 201, 220, 0.05); /* 桃香藍極淡背景 */
            border: 1px solid #85C9DC; /* 桃香藍 */
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
